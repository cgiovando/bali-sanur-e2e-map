name: Refresh map data

# Re-bakes data/ from the live sources (OpenAerialMap, Overpass, ChatMap, HOT
# Portal) on a weekly schedule and on manual dispatch. The rolling 7-day OSM
# window is computed at build time, so each run keeps the map current. Commits
# to main, which triggers the GitHub Pages rebuild.

on:
  schedule:
    - cron: "17 6 * * 1" # every Monday 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bake data
        run: npm run build:data

      - name: Validate baked data
        run: npm run check:data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data changes."
          else
            git add data/
            git commit -m "chore: refresh Sanur map data ($(date -u +%Y-%m-%d))"
            git push
          fi
